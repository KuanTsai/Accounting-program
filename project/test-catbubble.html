<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CatBubble Test</title>
<script src="lib/react.development.js"></script>
<script src="lib/react-dom.development.js"></script>
<script src="lib/babel.js"></script>
<style>
  body { font-family: sans-serif; padding: 20px; background: #fafafa; }
  .row { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 24px; }
  .item { text-align: center; }
  .label { font-size: 11px; color: #666; margin-top: 6px; max-width: 80px; }
  h2 { margin-top: 24px; color: #333; font-size: 16px; }
  .pass { color: green; font-weight: bold; }
  .fail { color: red; font-weight: bold; }
</style>
</head>
<body>
<h1 style="font-size:18px">CatBubble Icon Test</h1>
<div id="root"></div>

<script type="text/babel" src="categories.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

// Inject custom categories for testing
window.CATEGORIES.push(
  { id: 'custom-1111', label: '娛樂', color: '#FF8FAB', bg: '#FFE5EC' },
  { id: 'custom-2222', label: '寵物', color: '#A8D8F0', bg: '#E0F2FA' },
  { id: 'custom-3333', label: 'A',   color: '#C9B8F0', bg: '#EFE9FF' },
);

function TestApp() {
  const builtins = ['food','drink','transport','shop','fun','beauty','home','health','study','gift','travel','salary'];
  const customs  = ['custom-1111','custom-2222','custom-3333','custom-unknown-no-cat'];

  const checkIsSpan = (id) => {
    const el = document.querySelector(`[data-test="${id}"]`);
    if (!el) return '?';
    const span = el.querySelector('span');
    const svg  = el.querySelector('svg');
    if (span) return `SPAN: "${span.textContent}"`;
    if (svg)  return 'SVG';
    return 'empty';
  };

  const [results, setResults] = useState({});
  useEffect(() => {
    setTimeout(() => {
      const r = {};
      [...builtins, ...customs].forEach(id => { r[id] = checkIsSpan(id); });
      setResults(r);
    }, 500);
  }, []);

  return (
    <div>
      <h2>Built-in Categories (should show SVG icon)</h2>
      <div className="row">
        {builtins.map(id => (
          <div key={id} className="item">
            <div data-test={id}><CatBubble id={id} size={48}/></div>
            <div className="label">{id}</div>
            <div className={results[id]?.startsWith('SVG') ? 'pass' : 'fail'} style={{fontSize:10}}>
              {results[id] || '...'}
            </div>
          </div>
        ))}
      </div>

      <h2>Custom Categories (should show label initial as text)</h2>
      <div className="row">
        {customs.map(id => {
          const cat = window.CATEGORIES.find(c => c.id === id);
          const expected = cat ? (cat.label || '?')[0] : '?';
          const passed = results[id] === `SPAN: "${expected}"`;
          return (
            <div key={id} className="item">
              <div data-test={id}><CatBubble id={id} size={48}/></div>
              <div className="label">{id.replace('custom-','c-')}</div>
              <div className={passed ? 'pass' : results[id] ? 'fail' : ''} style={{fontSize:10}}>
                {results[id] || '...'}
              </div>
            </div>
          );
        })}
      </div>

      <h2>Summary</h2>
      <div>
        {Object.entries(results).length > 0 && (
          <>
            <div className={builtins.every(id => results[id]?.startsWith('SVG')) ? 'pass' : 'fail'}>
              Built-ins: {builtins.filter(id => results[id]?.startsWith('SVG')).length}/{builtins.length} show SVG
            </div>
            <div className={customs.slice(0,3).every(id => results[id]?.startsWith('SPAN')) ? 'pass' : 'fail'}>
              Custom: {customs.filter(id => results[id]?.startsWith('SPAN')).length}/{customs.length} show initial char
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TestApp/>);
</script>
</body>
</html>
